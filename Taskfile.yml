version: '3'

vars:
  BINARY: parse-roll20-log

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY}} ./cmd/{{.BINARY}}

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race -count=1 ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Check formatting
    cmds:
      - test -z "$(gofmt -l .)"

  fmt:fix:
    desc: Fix formatting
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  vulncheck:
    desc: Run govulncheck
    cmds:
      - govulncheck ./...

  check:
    desc: Run all CI checks (test, vet, fmt, lint, vulncheck)
    cmds:
      - task: test
      - task: vet
      - task: fmt
      - task: lint
      - task: vulncheck

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
